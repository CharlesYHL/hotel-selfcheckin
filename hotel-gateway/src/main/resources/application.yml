server:
  port: 8080

spring:
  main:
    web-application-type: reactive
  application:
    name: api-gateway
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:3306/hotel_db?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:hotel2024}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
      password: ${REDIS_PASSWORD:redis-pass-2024}
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/order/**
        - id: room-service
          uri: lb://room-service
          predicates:
            - Path=/api/room/**
        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/api/pay/**
        - id: checkin-service
          uri: lb://checkin-service
          predicates:
            - Path=/api/checkin/**
        - id: card-service
          uri: lb://card-service
          predicates:
            - Path=/api/card/**
        - id: member-service
          uri: lb://member-service
          predicates:
            - Path=/api/member/**

jwt:
  secret: ${JWT_SECRET:hotel-selfcheckin-jwt-secret-key-min-256-bits!!}
  expiration: 86400000

sign:
  secret: ${SIGN_SECRET:hotel-sign-secret-change-in-production}
  enabled: false
  maxAge: 300000

gateway:
  white-list:
    paths:
      - /api/auth/
      - /api/sms/send
      - /actuator
      - /static

logging:
  level:
    com.hotel.gateway: INFO
