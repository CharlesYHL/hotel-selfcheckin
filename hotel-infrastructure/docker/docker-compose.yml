version: '3.8'

services:
  # ======================== MySQL ========================
  mysql:
    image: mysql:8.0
    container_name: hotel-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: hotel2024
      MYSQL_DATABASE: hotel_db
    volumes:
      - ./mysql/mgr.cnf:/etc/mysql/conf.d/mgr.cnf
      - ../sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ../sql/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hotel-net

  # ======================== Redis ========================
  redis:
    image: redis:7.0-alpine
    container_name: hotel-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass redis-pass-2024
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis-pass-2024", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hotel-net

  # ======================== Kafka ========================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    platform: linux/amd64
    container_name: hotel-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - hotel-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    platform: linux/amd64
    container_name: hotel-kafka
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data
    depends_on:
      - zookeeper
    networks:
      - hotel-net

  # ======================== Nacos ========================
  nacos:
    image: nacos/nacos-server:v2.3.1
    platform: linux/amd64
    container_name: hotel-nacos
    ports:
      - "8848:8848"
      - "9848:9848"
    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname
    networks:
      - hotel-net

  # ======================== Sentinel Dashboard ========================
  sentinel-dashboard:
    image: bladex/sentinel-dashboard:1.8.6
    platform: linux/amd64
    container_name: hotel-sentinel
    ports:
      - "8858:8858"
    environment:
      SERVER_PORT: 8858
      SENTINEL_DASHBOARD_USERNAME: sentinel
      SENTINEL_DASHBOARD_PASSWORD: sentinel
    networks:
      - hotel-net

volumes:
  mysql_data:
  redis_data:
  kafka_data:

networks:
  hotel-net:
    driver: bridge
